<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微店24 值班店长知识库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#e63946;
  --primary-dark:#c1121f;
  --primary-light:#fff0f0;
  --danger:#ff4d4f;
  --warning:#faad14;
  --success:#52c41a;
  --text:#1a1a1a;
  --text-secondary:#666;
  --border:#e8e8e8;
  --bg:#fff5f5;
  --sidebar-w:268px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

/* ── Layout ───────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Sidebar Header ───────────────────────────── */
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sidebar-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-logo h1{font-size:15px;font-weight:700;color:var(--text)}
.sidebar-header p{font-size:11px;color:var(--text-secondary)}

/* Module tabs in sidebar */
.sidebar-modules{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
.mod-tab{flex:1;padding:5px 4px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;color:var(--text-secondary);cursor:pointer;background:#fff;transition:.15s;line-height:1.3}
.mod-tab:hover{border-color:var(--primary);color:var(--primary)}
.mod-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:var(--bg)}
.sidebar-search input:focus{border-color:var(--primary);background:#fff}

#nav-tree{flex:1;overflow-y:auto;padding:6px 0}
.nav-l1{cursor:pointer;user-select:none}
.nav-l1-label{display:flex;align-items:center;gap:6px;padding:7px 14px;font-weight:600;font-size:12px;color:var(--text)}
.nav-l1-label:hover{background:var(--bg)}
.nav-l1-label .arrow{font-size:9px;transition:.2s;color:var(--text-secondary);flex-shrink:0}
.nav-l1.open>.nav-l1-label .arrow{transform:rotate(90deg)}
.nav-l1-icon{font-size:14px}
.nav-l2-list{display:none}
.nav-l1.open>.nav-l2-list{display:block}
.nav-l2{cursor:pointer;padding:5px 14px 5px 34px;font-size:12px;color:var(--text-secondary);border-radius:4px;margin:1px 8px;line-height:1.5}
.nav-l2:hover{background:var(--bg);color:var(--text)}
.nav-l2.active{background:var(--primary-light);color:var(--primary);font-weight:500}

/* ── Topbar ───────────────────────────────────── */
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#search-box{flex:1;max-width:480px;position:relative}
#search-box input{width:100%;padding:7px 36px 7px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;background:var(--bg);font-family:inherit}
#search-box input:focus{border-color:var(--primary);background:#fff}
#search-box .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:12px}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-default{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-default:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:12px}
.topbar-user{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px}
.topbar-user span{color:var(--primary);font-weight:500}

/* ── Content ──────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Search Results ───────────────────────────── */
#search-results{display:none}
#search-results.show{display:block}
.search-result-item{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:.15s}
.search-result-item:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(94,179,255,.15)}
.search-result-item .sr-breadcrumb{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.search-result-item .sr-title{font-size:13px;font-weight:600;margin-bottom:4px}
.search-result-item .sr-snippet{font-size:12px;color:var(--text-secondary);line-height:1.6}
.highlight{background:#e6f4ff;color:var(--primary-dark);padding:0 2px;border-radius:2px;font-weight:500}

/* ── Breadcrumb ───────────────────────────────── */
.breadcrumb-nav{font-size:12px;color:var(--text-secondary);margin-bottom:14px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb-nav .bc-link{cursor:pointer;color:var(--primary)}
.breadcrumb-nav .bc-link:hover{text-decoration:underline}
.breadcrumb-nav .bc-sep{color:#ccc}
.breadcrumb-nav .bc-cur{color:var(--text-secondary)}

/* ── Page Header ──────────────────────────────── */
.page-header{margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.page-header p{color:var(--text-secondary);font-size:13px}

/* ── Module Cards (Home) ──────────────────────── */
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.module-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:22px 20px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.module-card.mod-sop::before{background:linear-gradient(90deg,var(--primary),#93c5fd)}
.module-card.mod-exception::before{background:linear-gradient(90deg,var(--warning),#fcd34d)}
.module-card.mod-ai::before{background:linear-gradient(90deg,var(--success),#86efac)}
.module-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(94,179,255,.18);transform:translateY(-2px)}
.module-card .mc-icon{font-size:32px;margin-bottom:10px}
.module-card .mc-title{font-size:15px;font-weight:700;margin-bottom:6px}
.module-card .mc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px}
.module-card .mc-stats{display:flex;gap:12px}
.module-card .mc-stat{font-size:11px;color:var(--text-secondary)}
.module-card .mc-stat strong{color:var(--primary);font-size:16px;display:block;font-weight:700}

/* ── Home Stats ───────────────────────────────── */
.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:8px;padding:14px;border:1px solid var(--border);text-align:center}
.stat-card .stat-num{font-size:26px;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:11px;color:var(--text-secondary);margin-top:2px}

/* ── Category Cards ───────────────────────────── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.cat-card{background:#fff;border-radius:8px;border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:.2s}
.cat-card:hover{border-color:var(--primary);box-shadow:0 2px 10px rgba(94,179,255,.14);transform:translateY(-1px)}
.card-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-bottom:8px}
.tag-danger{background:#fff1f0;color:var(--danger)}
.tag-warning{background:#fffbe6;color:#d48806}
.tag-success{background:#f6ffed;color:#389e0d}
.tag-primary{background:var(--primary-light);color:var(--primary-dark)}
.tag-default{background:var(--bg);color:var(--text-secondary)}
.cat-card h3{font-size:13px;font-weight:600;margin-bottom:4px}
.cat-card p{font-size:12px;color:var(--text-secondary);line-height:1.5}
.cat-card .cc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.cat-card .cc-count{font-size:11px;color:var(--text-secondary)}

/* ── Scenario List ────────────────────────────── */
.scenario-list{display:flex;flex-direction:column;gap:6px}
.scenario-item{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
.scenario-item:hover{border-color:var(--primary);background:var(--primary-light)}
.s-body{flex:1;min-width:0}
.s-title{font-size:13px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-tags{display:flex;gap:4px;flex-wrap:wrap}
.s-tag{padding:1px 6px;border-radius:8px;font-size:10px;background:var(--bg);color:var(--text-secondary)}
.s-arrow{color:#ccc;font-size:16px;flex-shrink:0}

/* ── Risk Badge ───────────────────────────────── */
.risk-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;flex-shrink:0}
.risk-high{background:#fff1f0;color:var(--danger)}
.risk-mid{background:#fffbe6;color:#d48806}
.risk-low{background:#f6ffed;color:#389e0d}

/* ── Scenario Detail ──────────────────────────── */
#scenario-view{display:none}
.scenario-header{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:12px;border:1px solid var(--border)}
.scenario-header h2{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.4}
.scenario-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.meta-tag{padding:3px 10px;border-radius:10px;font-size:11px;background:var(--bg);color:var(--text-secondary)}
.warning-box{background:#fffbe6;border:1px solid #ffe58f;border-left:3px solid var(--warning);border-radius:6px;padding:10px 14px;margin-top:10px;font-size:13px;color:#7c5800;line-height:1.6;white-space:pre-line}
.warning-box strong{color:#d48806}

.section-card{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.section-card h4{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;color:var(--text)}
.section-icon{font-size:15px}

.flow-steps{display:flex;flex-direction:column;gap:8px}
.flow-step{display:flex;gap:10px;align-items:flex-start}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-num.dot{background:var(--bg);color:var(--text-secondary);font-size:14px}
.step-content{flex:1;font-size:13px;line-height:1.7;color:var(--text)}

.script-box{background:#f0f8ff;border-left:3px solid var(--primary);border-radius:0 6px 6px 0;padding:10px 14px;margin:6px 0}
.script-label{font-size:11px;color:var(--primary-dark);font-weight:600;margin-bottom:4px}
.script-box p{font-size:13px;line-height:1.8;color:#1a3a5c;white-space:pre-line}

/* ── Admin Panel ──────────────────────────────── */
#admin-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
#admin-panel.show{display:flex}
.admin-modal{background:#fff;border-radius:12px;width:90%;max-width:760px;max-height:90vh;display:flex;flex-direction:column}
.admin-modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.admin-modal-header h3{font-size:15px;font-weight:700}
.admin-modal-body{flex:1;overflow-y:auto;padding:18px}
.admin-modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;margin-bottom:5px;color:var(--text)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{min-height:90px;resize:vertical;line-height:1.6}

/* ── Admin Login Overlay ─────────────────────── */
#login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:12px;padding:28px;width:300px;text-align:center}
.login-box h3{font-size:16px;font-weight:700;margin-bottom:16px}
.login-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit}
.login-box input:focus{border-color:var(--primary)}
.login-error{color:var(--danger);font-size:12px;margin-bottom:8px;display:none}

/* ── Edit FAB ──────────────────────���──────────── */
.edit-fab{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 4px 14px rgba(94,179,255,.5);display:none;align-items:center;justify-content:center;z-index:100;transition:.2s}
.edit-fab.show{display:flex}
.edit-fab:hover{background:var(--primary-dark);transform:scale(1.05)}

/* ── Empty ────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ── High Freq ────────────────────────────────── */
.hf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:24px}
.hf-card{background:#fff;border-radius:8px;border:1px solid var(--border);border-left:3px solid var(--border);padding:12px 14px;cursor:pointer;transition:.2s}
.hf-card:hover{box-shadow:0 2px 10px rgba(230,57,70,.12);transform:translateY(-1px)}
.risk-border-high{border-left-color:var(--danger)}
.risk-border-mid{border-left-color:var(--warning)}
.risk-border-low{border-left-color:var(--success)}
.hf-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.hf-title{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hf-cat{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.hf-step{font-size:11px;color:var(--primary);background:var(--primary-light);padding:3px 8px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Scrollbar ────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d9d9d9;border-radius:2px}

@media(max-width:900px){
  .module-grid{grid-template-columns:1fr}
  .home-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">微</div>
        <h1>微店 24 知识库</h1>
      </div>
      <p>值班店长 · 云值守 SOP</p>
    </div>

    <div class="sidebar-modules">
      <div class="mod-tab active" id="tab-all"    onclick="filterModule('all')">全部</div>
      <div class="mod-tab"        id="tab-sop"    onclick="filterModule('sop-scenarios')">全场景</div>
      <div class="mod-tab"        id="tab-exc"    onclick="filterModule('exception-handling')">异常</div>
      <div class="mod-tab"        id="tab-ai"     onclick="filterModule('ai-watching')">AI值守</div>
    </div>

    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="搜索场景..." oninput="sidebarSearch(this.value)">
    </div>
    <div id="nav-tree"></div>
  </div>

  <!-- ── Main ── -->
  <div id="main">
    <div id="topbar">
      <div id="search-box">
        <input type="text" id="global-search" placeholder="🔍 搜索场景、话术、处理流程..." oninput="globalSearch(this.value)" onkeydown="if(event.key==='Escape')clearSearch()">
        <span class="search-icon">⌘K</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-user">你好，<span id="user-name">-</span></div>
        <span id="admin-status" style="font-size:11px;color:var(--primary);font-weight:500"></span>
        <button id="admin-btn" class="btn btn-default btn-sm" onclick="showAdminLogin()" style="display:none">管理员</button>
        <button id="backend-btn" class="btn btn-default btn-sm" onclick="window.location.href='admin.html'" style="display:none">后台管理</button>
        <button class="btn btn-default btn-sm" onclick="doLogout()">退出</button>
      </div>
    </div>

    <div id="content">
      <div id="search-results"></div>
      <div id="category-view"></div>
      <div id="scenario-view"></div>
    </div>
  </div>
</div>

<!-- Admin login overlay -->
<div id="login-overlay" style="display:none">
  <div class="login-box">
    <h3>🔐 管理员验证</h3>
    <input type="password" id="admin-pwd" placeholder="请输入管理员密码">
    <div class="login-error" id="login-error">密码错误，请重试</div>
    <button class="btn btn-primary" style="width:100%;padding:10px;margin-bottom:8px" onclick="doAdminLogin()">确认</button>
    <button class="btn btn-default" style="width:100%;padding:10px" onclick="closeLogin()">取消</button>
  </div>
</div>

<!-- Admin edit panel -->
<div id="admin-panel">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h3>✏️ 编辑场景</h3>
      <button class="btn btn-default btn-sm" onclick="closeAdminPanel()">✕ 关闭</button>
    </div>
    <div class="admin-modal-body" id="admin-form-body"></div>
    <div class="admin-modal-footer">
      <button class="btn btn-default" onclick="closeAdminPanel()">取消</button>
      <button class="btn btn-primary" onclick="saveScenario()">保存</button>
    </div>
  </div>
</div>

<button class="edit-fab" id="edit-fab" onclick="openEditCurrent()" title="编辑此场景">✏️</button>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
